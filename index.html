<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Componente Visual</title>
    
    <link rel="stylesheet" href="css/index.css">
    <script type="module" src="js/index.js"></script>
</head>
<body>
    <div class="contenedor-formulario">        
        <div class="cabecera-registro">
            <h2>Crear Cuenta</h2>
            <p>Regístrate para acceder al sistema</p>
        </div>
        <form id="formulario-registro">
            <div class="grupo-input">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre">
            </div>
            <div class="grupo-input">
                <label for="correo">Correo Electrónico</label>
                <input type="text" id="correo" placeholder="ejemplo@correo.com">
            </div>
            <div class="grupo-input">
                <label for="contraseña">Crear Contraseña</label>
                <input type="password" id="contraseña" placeholder="Mínimo 8 caracteres">

                <div class="mostrar-contraseña-contenedor">
                    <input type="checkbox" id="mostrar-contraseña">
                    <label for="mostrar-contraseña" class="label-checkbox">Mostrar contraseña</label>
                </div>
            </div>

            <button type="button" class="btn-registrar">Registrarse</button>
            
            <div class="enlace-login">
                <p>¿Ya tienes cuenta? <a href="#">Inicia sesión aquí</a></p>
            </div>
        </form>
    </div>
</body>
</html>
